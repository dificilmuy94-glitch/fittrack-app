[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# index.html nunca se cachea — siempre carga la versión más reciente
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"

# Los assets (JS/CSS con hash) se cachean para siempre — son inmutables
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
